<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="dark light" />
<title>ToolNeuron</title>
<style>
:root{
  color-scheme:dark light;
  --bg:#f7f9fd;--panel:#ffffff;--panel-2:#eef3fb;--text:#111827;--muted:#667085;
  --line:#dfe7f1;--line-2:#c7d3e3;--brand:#2f6fa8;--brand-2:#e6f1ff;
  --danger:#c24141;--shadow:0 24px 80px rgba(15,23,42,.16);
  --radius:18px;--rail:82px;--left:286px;--right:340px;
}
@media (prefers-color-scheme:dark){
  :root{--bg:#0f141b;--panel:#171e28;--panel-2:#202a36;--text:#eef4fb;--muted:#9aa7b8;--line:#263242;--line-2:#36475b;--brand:#9fcaff;--brand-2:#183251;--danger:#ff8585;--shadow:0 24px 80px rgba(0,0,0,.42)}
}
html[data-theme=light]{color-scheme:light;--bg:#f7f9fd;--panel:#ffffff;--panel-2:#eef3fb;--text:#111827;--muted:#667085;--line:#dfe7f1;--line-2:#c7d3e3;--brand:#2f6fa8;--brand-2:#e6f1ff;--danger:#c24141;--shadow:0 24px 80px rgba(15,23,42,.16)}
html[data-theme=dark]{color-scheme:dark;--bg:#0f141b;--panel:#171e28;--panel-2:#202a36;--text:#eef4fb;--muted:#9aa7b8;--line:#263242;--line-2:#36475b;--brand:#9fcaff;--brand-2:#183251;--danger:#ff8585;--shadow:0 24px 80px rgba(0,0,0,.42)}
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font:15px/1.48 ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;letter-spacing:0;overflow:hidden}
button,input,textarea,select{font:inherit;color:inherit}
button{border:0;cursor:pointer}
.app{height:100dvh;display:grid;grid-template-columns:var(--left) minmax(0,1fr) var(--right);transition:grid-template-columns .22s cubic-bezier(.2,.8,.2,1)}
.app.left-closed{grid-template-columns:var(--rail) minmax(0,1fr) var(--right)}
.app.right-closed{grid-template-columns:var(--left) minmax(0,1fr) 0px}
.app.left-closed.right-closed{grid-template-columns:var(--rail) minmax(0,1fr) 0px}
.left,.right{background:var(--panel);border-color:var(--line);overflow:hidden;transition:transform .22s cubic-bezier(.2,.8,.2,1),opacity .18s,width .22s}
.left{border-right:1px solid var(--line);display:flex;flex-direction:column;min-width:0}
.right{border-left:1px solid var(--line);display:flex;flex-direction:column;min-width:0}
.app.right-closed .right{opacity:0;pointer-events:none}
.brand{height:64px;display:flex;align-items:center;gap:10px;padding:0 18px;font-weight:750;white-space:nowrap}
.brand-mark{width:28px;height:28px;border-radius:8px;background:var(--brand-2);color:var(--brand);display:grid;place-items:center;font-weight:900}
.left-closed .brand span:last-child,.left-closed .nav-label,.left-closed .side-section,.left-closed .profile-name{display:none}
.nav{padding:8px 12px;display:flex;flex-direction:column;gap:8px}
.nav-btn{height:42px;border-radius:12px;background:transparent;color:var(--text);display:flex;align-items:center;gap:12px;padding:0 12px;text-align:left}
.nav-btn:hover,.nav-btn.active{background:var(--panel-2)}
.ico{width:20px;text-align:center;font-size:18px;color:var(--muted)}
.new-chat{background:var(--text);color:var(--bg);font-weight:700}
.left-closed .new-chat{justify-content:center;padding:0}
.side-section{padding:14px 14px 0;min-height:0;display:flex;flex-direction:column;gap:8px;flex:1}
.side-title{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.chat-list{overflow:auto;display:flex;flex-direction:column;gap:6px;padding-bottom:10px}
.chat-row{border-radius:12px;padding:10px 10px;background:transparent;display:flex;align-items:center;gap:8px;color:var(--text);text-align:left}
.chat-row:hover,.chat-row.active{background:var(--panel-2)}
.chat-row span{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.chat-row small{color:var(--muted)}
.profile{border-top:1px solid var(--line);padding:12px;display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;background:#f59e0b;color:#fff;display:grid;place-items:center;font-weight:800}
.profile-name{font-weight:650}
.center{height:100dvh;display:flex;flex-direction:column;min-width:0}
.topbar{height:64px;display:flex;align-items:center;gap:10px;padding:0 20px;border-bottom:1px solid var(--line);background:color-mix(in oklab,var(--bg) 92%,transparent);backdrop-filter:blur(14px);z-index:2}
.icon-btn{width:38px;height:38px;border-radius:12px;background:transparent;color:var(--muted);display:grid;place-items:center;font-size:18px}
.icon-btn:hover{background:var(--panel-2);color:var(--text)}
.model-picker{position:relative}
.model-button{height:40px;border-radius:13px;background:transparent;padding:0 10px;font-size:20px;font-weight:650;display:flex;align-items:center;gap:8px;max-width:min(44vw,520px)}
.model-button:hover{background:var(--panel-2)}
.model-button span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.model-menu,.history-pop{position:absolute;top:48px;left:0;width:min(520px,calc(100vw - 40px));background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:18px;padding:12px;z-index:20;opacity:0;transform:translateY(-8px);pointer-events:none;transition:.16s}
.model-menu.open,.history-pop.open{opacity:1;transform:translateY(0);pointer-events:auto}
.searchbox{display:flex;gap:8px;align-items:center;background:var(--panel-2);border:1px solid var(--line);border-radius:13px;padding:8px 10px}
.searchbox input{border:0;background:transparent;outline:0;width:100%}
.model-list{max-height:310px;overflow:auto;padding-top:8px}
.model-option{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px;border-radius:12px;background:transparent;text-align:left}
.model-option:hover,.model-option.active{background:var(--panel-2)}
.pill{font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:2px 7px}
.grow{flex:1}
.status{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:34vw}
.thread{flex:1;overflow:auto;padding:28px 24px 160px}
.empty{height:100%;display:grid;place-items:center;text-align:center}
.empty h1{font-size:38px;line-height:1.1;margin:0 0 10px}
.empty p{margin:0;color:var(--muted)}
.suggestions{margin-top:26px;display:grid;grid-template-columns:repeat(2,minmax(0,220px));gap:12px;justify-content:center}
.suggestions button{height:54px;border-radius:14px;border:1px solid var(--line);background:var(--panel);text-align:left;padding:0 14px;display:flex;align-items:center;justify-content:space-between}
.messages{max-width:880px;margin:0 auto;display:flex;flex-direction:column;gap:22px}
.msg{display:flex;gap:14px;align-items:flex-start}
.msg.user{justify-content:flex-end}
.bubble{max-width:min(760px,86%);border-radius:18px;padding:13px 16px;background:var(--panel);border:1px solid var(--line)}
.user .bubble{background:var(--brand-2);border-color:transparent}
.assistant .bubble{background:transparent;border-color:transparent;padding-left:0}
.role-dot{width:9px;height:9px;border-radius:50%;background:var(--brand);margin-top:19px;flex:none}
.actions{display:flex;gap:4px;margin-top:8px;opacity:.72}
.actions button{background:var(--panel-2);color:var(--muted);border-radius:9px;padding:5px 8px}
.actions button:hover{color:var(--text)}
.md{overflow-wrap:anywhere}
.md p{margin:0 0 10px}
.md p:last-child{margin-bottom:0}
.md h1,.md h2,.md h3{margin:16px 0 8px;line-height:1.2}
.md h1{font-size:1.55em}.md h2{font-size:1.32em}.md h3{font-size:1.12em}
.md blockquote{margin:10px 0;padding:8px 12px;border-left:3px solid var(--brand);background:var(--panel-2);border-radius:8px}
.md pre{background:#0b1020;color:#e5edf7;border-radius:12px;padding:12px;overflow:auto}
.md code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:var(--panel-2);padding:1px 4px;border-radius:5px}
.md pre code{background:transparent;padding:0}
.md ul,.md ol{padding-left:22px;margin:8px 0}
.md table{border-collapse:collapse;display:block;overflow:auto}
.md th,.md td{border:1px solid var(--line);padding:6px 8px}
.composer-wrap{position:absolute;left:calc(var(--left) + 24px);right:calc(var(--right) + 24px);bottom:18px;transition:left .22s,right .22s}
.left-closed .composer-wrap{left:calc(var(--rail) + 24px)}
.right-closed .composer-wrap{right:24px}
.composer{max-width:880px;margin:0 auto;background:var(--panel);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:12px}
.attachments{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.chip{display:flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--panel-2);border-radius:999px;padding:5px 9px;color:var(--muted);font-size:12px}
.chip button{background:transparent;color:var(--muted)}
.input-row{display:flex;align-items:flex-end;gap:8px}
textarea{flex:1;min-height:44px;max-height:180px;resize:none;border:0;background:transparent;outline:0;padding:10px;font-size:16px}
.send{width:42px;height:42px;border-radius:50%;background:var(--text);color:var(--bg);font-weight:800}
.send:disabled{opacity:.35;cursor:not-allowed}
.right-head{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--line)}
.right-head h2{margin:0;font-size:18px}
.settings{padding:16px;overflow:auto;display:flex;flex-direction:column;gap:14px}
details.card{background:var(--panel-2);border:1px solid var(--line);border-radius:16px;padding:12px}
details.card summary{cursor:pointer;font-weight:700;list-style:none;display:flex;justify-content:space-between}
details.card summary::-webkit-details-marker{display:none}
details.card summary:after{content:"+";color:var(--muted)}
details.card[open] summary:after{content:"-"}
.form{display:flex;flex-direction:column;gap:10px;margin-top:12px}
label{display:flex;flex-direction:column;gap:5px;color:var(--muted);font-size:12px}
label input,label select,label textarea{width:100%;border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:9px 10px;outline:0}
label textarea{min-height:100px}
.row{display:flex;gap:8px;align-items:center}
.row>*{flex:1}
.primary{background:var(--text);color:var(--bg);border-radius:12px;padding:10px 12px;font-weight:700}
.secondary{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
.danger{color:var(--danger)}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);border-radius:999px;padding:9px 14px;opacity:0;pointer-events:none;transition:.18s;z-index:60}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.drop{position:fixed;inset:0;border:3px dashed var(--brand);background:rgba(47,111,168,.12);display:none;place-items:center;z-index:50;font-size:24px;font-weight:800}
.drop.show{display:grid}
.overlay{display:none}
@media (max-width:1100px){
  .app{grid-template-columns:var(--rail) minmax(0,1fr) 0}
  .right{position:fixed;top:0;right:0;width:min(86vw,360px);height:100dvh;z-index:30;box-shadow:var(--shadow);transform:translateX(100%);opacity:1}
  .right.open{transform:translateX(0);pointer-events:auto}
  .composer-wrap{left:calc(var(--rail) + 14px);right:14px}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:25;display:none}
  .overlay.show{display:block}
}
@media (max-width:720px){
  .app{grid-template-columns:1fr}
  .left{position:fixed;top:0;left:0;width:min(86vw,300px);height:100dvh;z-index:30;box-shadow:var(--shadow);transform:translateX(-100%)}
  .left.open{transform:translateX(0)}
  .app.left-closed{grid-template-columns:1fr}
  .composer-wrap{left:10px;right:10px;bottom:10px}
  .thread{padding:18px 12px 150px}
  .suggestions{grid-template-columns:1fr}
  .empty h1{font-size:30px}
  .status{display:none}
}
</style>
</head>
<body>
<div id="app" class="app">
  <aside id="left" class="left">
    <div class="brand"><div class="brand-mark">TN</div><span>ToolNeuron</span></div>
    <nav class="nav">
      <button id="newChat" class="nav-btn new-chat"><span class="ico">+</span><span class="nav-label">New chat</span></button>
      <button id="historyBtn" class="nav-btn"><span class="ico">⌕</span><span class="nav-label">History</span></button>
      <button id="leftToggle" class="nav-btn"><span class="ico">≡</span><span class="nav-label">Collapse</span></button>
      <div id="historyPop" class="history-pop">
        <div class="searchbox"><span>⌕</span><input id="historySearch" placeholder="Search chats" /></div>
        <div id="historyList" class="model-list"></div>
      </div>
    </nav>
    <section class="side-section">
      <div class="side-title">Chats</div>
      <div id="chatList" class="chat-list"></div>
    </section>
    <div class="profile"><div class="avatar">S</div><div class="profile-name">Local session</div></div>
  </aside>
  <main class="center">
    <div class="topbar">
      <button id="mobileLeft" class="icon-btn">≡</button>
      <div class="model-picker">
        <button id="modelBtn" class="model-button"><span id="modelLabel">Choose model</span><span>⌄</span></button>
        <div id="modelMenu" class="model-menu">
          <div class="searchbox"><span>⌕</span><input id="modelSearch" placeholder="Search a model" /></div>
          <div id="modelList" class="model-list"></div>
        </div>
      </div>
      <div class="grow"></div>
      <div id="status" class="status">Add token, then load models</div>
      <button id="voiceOutBtn" class="icon-btn" title="Read responses">◉</button>
      <button id="rightToggle" class="icon-btn" title="Controls">☷</button>
    </div>
    <section id="thread" class="thread">
      <div id="empty" class="empty">
        <div>
          <h1>How can I help?</h1>
          <p>Choose a model, attach files or images, then start chatting.</p>
          <div class="suggestions">
            <button data-prompt="Summarize this file after I attach it.">Summarize a file <b>+</b></button>
            <button data-prompt="Explain this from the basics.">Learn from docs <b>+</b></button>
            <button data-prompt="Write a concise answer with sources.">Research a topic <b>+</b></button>
            <button data-prompt="Describe this image after I attach it.">Use an image <b>+</b></button>
          </div>
        </div>
      </div>
      <div id="messages" class="messages"></div>
    </section>
    <div class="composer-wrap">
      <form id="composer" class="composer">
        <div id="attachments" class="attachments"></div>
        <div class="input-row">
          <button type="button" id="attachBtn" class="icon-btn" title="Attach">+</button>
          <input id="fileInput" type="file" hidden multiple />
          <textarea id="prompt" placeholder="Send a message..." rows="1"></textarea>
          <button type="button" id="micBtn" class="icon-btn" title="Voice input">🎙</button>
          <button id="sendBtn" class="send" type="submit">➤</button>
        </div>
      </form>
    </div>
  </main>
  <aside id="right" class="right">
    <div class="right-head"><h2>Controls</h2><button id="closeRight" class="icon-btn">×</button></div>
    <div class="settings">
      <details class="card" open><summary>Connection</summary>
        <div class="form">
          <label>Server URL<input id="serverUrl" placeholder="http://192.168.x.x:11434" /></label>
          <label>Bearer token<input id="token" type="password" placeholder="tn_sk_..." /></label>
          <div class="row"><button id="saveSettings" class="primary" type="button">Save</button><button id="reloadModels" class="secondary" type="button">Reload models</button></div>
        </div>
      </details>
      <details class="card" open><summary>Model</summary>
        <div class="form">
          <label>Chat model<select id="modelSelect"></select></label>
          <label>System prompt<textarea id="systemPrompt" placeholder="Optional system prompt"></textarea></label>
          <div class="row"><label>Max tokens<input id="maxTokens" type="number" min="32" max="8192" value="1024" /></label><label>Temperature<input id="temp" type="number" min="0" max="2" step=".05" value=".7" /></label></div>
          <label><span class="row"><input id="stream" type="checkbox" checked /> Stream response</span></label>
        </div>
      </details>
      <details class="card" open><summary>Interface</summary>
        <div class="form">
          <label>Theme<select id="theme"><option value="system">Same as system</option><option value="light">Light</option><option value="dark">Dark</option></select></label>
          <label><span class="row"><input id="speakReplies" type="checkbox" /> Voice output for replies</span></label>
          <label><span class="row"><input id="notifyReplies" type="checkbox" checked /> Notify when tab is hidden</span></label>
        </div>
      </details>
      <details class="card"><summary>Data</summary>
        <div class="form">
          <button id="exportChats" class="secondary" type="button">Export chats</button>
          <button id="clearChats" class="secondary danger" type="button">Clear chats</button>
        </div>
      </details>
    </div>
  </aside>
</div>
<div id="overlay" class="overlay"></div>
<div id="drop" class="drop">Drop files to attach</div>
<div id="toast" class="toast"></div>
<script>
(function(){
  "use strict";
  var $=function(id){return document.getElementById(id)};
  var app=$("app"),left=$("left"),right=$("right"),overlay=$("overlay"),toast=$("toast");
  var storeKey="tn.webui.v2";
  var state=loadState();
  var modelCache=[];
  var attachments=[];
  var activeChat=null;
  var recognition=null;

  function defaults(){return{serverUrl:location.origin,token:"",model:"",theme:"system",systemPrompt:"",maxTokens:1024,temp:.7,stream:true,speakReplies:false,notifyReplies:true,chats:[]}}
  function loadState(){try{return Object.assign(defaults(),JSON.parse(localStorage.getItem(storeKey)||"{}"))}catch(e){return defaults()}}
  function saveState(){localStorage.setItem(storeKey,JSON.stringify(state))}
  function showToast(s){toast.textContent=s;toast.classList.add("show");setTimeout(function(){toast.classList.remove("show")},2200)}
  function setStatus(s){$("status").textContent=s}
  function authHeaders(){var h={"Content-Type":"application/json"};if(state.token)h.Authorization="Bearer "+state.token;return h}
  function api(path){return (state.serverUrl||location.origin).replace(/\/+$/,"")+path}
  function uid(){return "c_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,8)}

  function applySettingsToUi(){
    $("serverUrl").value=state.serverUrl||location.origin;$("token").value=state.token||"";
    $("systemPrompt").value=state.systemPrompt||"";$("maxTokens").value=state.maxTokens||1024;
    $("temp").value=state.temp??.7;$("stream").checked=!!state.stream;
    $("theme").value=state.theme||"system";$("speakReplies").checked=!!state.speakReplies;$("notifyReplies").checked=state.notifyReplies!==false;
    applyTheme();
  }
  function readSettingsFromUi(){
    state.serverUrl=$("serverUrl").value.trim()||location.origin;state.token=$("token").value.trim();
    state.systemPrompt=$("systemPrompt").value;state.maxTokens=parseInt($("maxTokens").value||"1024",10);
    state.temp=parseFloat($("temp").value||".7");state.stream=$("stream").checked;
    state.theme=$("theme").value;state.speakReplies=$("speakReplies").checked;state.notifyReplies=$("notifyReplies").checked;
    saveState();applyTheme();
  }
  function applyTheme(){document.documentElement.dataset.theme=state.theme==="system"?"":state.theme}

  function newChat(){
    activeChat={id:uid(),title:"New chat",createdAt:Date.now(),messages:[]};
    state.chats.unshift(activeChat);saveState();renderAll();
  }
  function pickChat(id){activeChat=state.chats.find(function(c){return c.id===id})||null;renderAll()}
  function deleteChat(id){
    state.chats=state.chats.filter(function(c){return c.id!==id});
    if(activeChat&&activeChat.id===id)activeChat=state.chats[0]||null;
    saveState();renderAll();
  }
  function renameFromFirstMessage(chat){
    var first=chat.messages.find(function(m){return m.role==="user"});
    chat.title=first?first.text.trim().replace(/\s+/g," ").slice(0,44)||"New chat":"New chat";
  }
  function renderChats(){
    var list=$("chatList"),hist=$("historyList");list.innerHTML="";hist.innerHTML="";
    var q=($("historySearch").value||"").toLowerCase();
    state.chats.forEach(function(chat){
      if(q&&!(chat.title||"").toLowerCase().includes(q))return;
      var row=document.createElement("button");row.className="chat-row"+(activeChat&&chat.id===activeChat.id?" active":"");
      row.innerHTML="<span></span><small>×</small>";row.querySelector("span").textContent=chat.title||"New chat";
      row.onclick=function(e){if(e.target.tagName==="SMALL"){deleteChat(chat.id)}else pickChat(chat.id)};
      list.appendChild(row.cloneNode(true));
      list.lastChild.onclick=row.onclick;
      hist.appendChild(row);
    });
  }
  function renderMessages(){
    var messages=$("messages"),empty=$("empty");messages.innerHTML="";
    var msgs=activeChat?activeChat.messages:[];
    empty.style.display=msgs.length?"none":"grid";
    msgs.forEach(function(m,i){
      var outer=document.createElement("div");outer.className="msg "+m.role;
      if(m.role==="assistant"){var dot=document.createElement("div");dot.className="role-dot";outer.appendChild(dot)}
      var bubble=document.createElement("div");bubble.className="bubble";
      if(m.files&&m.files.length){var chips=document.createElement("div");chips.className="attachments";m.files.forEach(function(f){var c=document.createElement("span");c.className="chip";c.textContent=(f.kind==="image"?"Image: ":"File: ")+f.name;chips.appendChild(c)});bubble.appendChild(chips)}
      var md=document.createElement("div");md.className="md";md.innerHTML=renderMarkdown(m.text||"");bubble.appendChild(md);
      var acts=document.createElement("div");acts.className="actions";
      [["Copy",function(){navigator.clipboard&&navigator.clipboard.writeText(m.text||"");showToast("Copied")}],["Edit",function(){editMessage(i)}],["Delete",function(){activeChat.messages.splice(i,1);saveState();renderAll()}]].forEach(function(a){var b=document.createElement("button");b.type="button";b.textContent=a[0];b.onclick=a[1];acts.appendChild(b)});
      if(m.role==="assistant"){var sp=document.createElement("button");sp.type="button";sp.textContent="Speak";sp.onclick=function(){speak(m.text||"")};acts.appendChild(sp)}
      bubble.appendChild(acts);
      outer.appendChild(bubble);messages.appendChild(outer);
    });
    $("thread").scrollTop=$("thread").scrollHeight;
  }
  function editMessage(i){var m=activeChat.messages[i];var v=prompt("Edit message",m.text||"");if(v!=null){m.text=v;saveState();renderAll()}}
  function renderAll(){renderChats();renderMessages();renderModels();$("modelLabel").textContent=state.model||"Choose model"}

  function esc(s){return String(s??"").replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]})}
  function inline(s){return esc(s).replace(/`([^`]+)`/g,"<code>$1</code>").replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>").replace(/\*([^*]+)\*/g,"<em>$1</em>").replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noreferrer">$1</a>')}
  function renderMarkdown(src){
    src=String(src||"").replace(/\r\n/g,"\n");
    var out=[],inCode=false,code=[];
    src.split("\n").forEach(function(line){
      if(line.trim().startsWith("```")){if(inCode){out.push("<pre><code>"+esc(code.join("\n"))+"</code></pre>");code=[];inCode=false}else inCode=true;return}
      if(inCode){code.push(line);return}
      if(/^###\s+/.test(line))out.push("<h3>"+inline(line.replace(/^###\s+/,""))+"</h3>");
      else if(/^##\s+/.test(line))out.push("<h2>"+inline(line.replace(/^##\s+/,""))+"</h2>");
      else if(/^#\s+/.test(line))out.push("<h1>"+inline(line.replace(/^#\s+/,""))+"</h1>");
      else if(/^>\s?/.test(line))out.push("<blockquote>"+inline(line.replace(/^>\s?/,""))+"</blockquote>");
      else if(/^[-*]\s+/.test(line))out.push("<ul><li>"+inline(line.replace(/^[-*]\s+/,""))+"</li></ul>");
      else if(/^\d+[.)]\s+/.test(line))out.push("<ol><li>"+inline(line.replace(/^\d+[.)]\s+/,""))+"</li></ol>");
      else if(line.trim()==="")out.push("");
      else out.push("<p>"+inline(line)+"</p>");
    });
    if(inCode)out.push("<pre><code>"+esc(code.join("\n"))+"</code></pre>");
    return out.join("").replace(/<\/ul><ul>/g,"").replace(/<\/ol><ol>/g,"");
  }

  async function loadModels(){
    readSettingsFromUi();
    setStatus("Loading models...");
    try{
      var r=await fetch(api("/v1/models"),{headers:authHeaders()});
      if(r.status===401||r.status===403){setStatus("Token rejected. Paste the token from the app.");openRight();return}
      if(!r.ok)throw new Error(await r.text());
      var j=await r.json();modelCache=(j.data||[]).filter(function(m){return m.type==="gguf"||m.type==="vlm"});
      if(!state.model&&modelCache[0])state.model=modelCache.find(function(m){return m.default})?.id||modelCache[0].id;
      saveState();renderModels();setStatus(modelCache.length?modelCache.length+" chat-capable models":"No chat-capable models exposed");
      if(!modelCache.length)openRight();
    }catch(e){setStatus("Could not load models");showToast("Model load failed");openRight()}
  }
  function renderModels(){
    var search=($("modelSearch").value||"").toLowerCase();
    var selects=[$("modelList"),$("modelSelect")];selects.forEach(function(el){el.innerHTML=""});
    modelCache.filter(function(m){return !search||m.id.toLowerCase().includes(search)}).forEach(function(m){
      var b=document.createElement("button");b.className="model-option"+(m.id===state.model?" active":"");b.type="button";
      b.innerHTML="<span></span><span class='pill'></span>";b.querySelector("span").textContent=m.id;b.querySelector(".pill").textContent=m.type||"model";
      b.onclick=function(){state.model=m.id;saveState();$("modelMenu").classList.remove("open");renderAll()};
      $("modelList").appendChild(b);
      var o=document.createElement("option");o.value=m.id;o.textContent=m.id;if(m.id===state.model)o.selected=true;$("modelSelect").appendChild(o);
    });
    $("modelLabel").textContent=state.model||"Choose model";
  }

  async function submit(){
    if(!activeChat)newChat();
    readSettingsFromUi();
    var text=$("prompt").value.trim();
    if(!text&&!attachments.length)return;
    if(!state.token){openRight();showToast("Paste the server token first");return}
    if(!state.model){openRight();showToast("Choose a chat model first");return}
    var files=attachments.map(function(f){return{kind:f.kind,name:f.name,type:f.type}});
    activeChat.messages.push({role:"user",text:text,files:files});
    renameFromFirstMessage(activeChat);
    $("prompt").value="";attachments=[];renderAttachments();renderAll();
    var assistant={role:"assistant",text:""};activeChat.messages.push(assistant);renderAll();
    setStatus("Generating...");
    try{
      var messages=[];
      if(state.systemPrompt.trim())messages.push({role:"system",content:state.systemPrompt.trim()});
      activeChat.messages.slice(0,-1).forEach(function(m){
        if(m.role==="user"&&m.files&&m.files.length){
          var content=[];if(m.text)content.push({type:"text",text:m.text});
          m.files.forEach(function(f){var full=filesByName[f.name];if(full&&full.kind==="image")content.push({type:"image_url",image_url:{url:full.dataUrl}});else if(full&&full.text)content.push({type:"text",text:"Attached file "+full.name+":\n"+full.text.slice(0,12000)})});
          messages.push({role:"user",content:content.length?content:m.text});
        }else messages.push({role:m.role,content:m.text||""});
      });
      var body={model:state.model,messages:messages,max_tokens:state.maxTokens,temperature:state.temp,stream:state.stream};
      var r=await fetch(api("/v1/chat/completions"),{method:"POST",headers:authHeaders(),body:JSON.stringify(body)});
      if(!r.ok){throw new Error(await r.text())}
      if(state.stream&&r.body){await readStream(r,assistant)}else{var j=await r.json();assistant.text=j.choices?.[0]?.message?.content||""}
      saveState();renderAll();setStatus("Ready");
      if(state.speakReplies)speak(assistant.text);
      if(document.hidden&&state.notifyReplies)notify("ToolNeuron response ready",assistant.text.slice(0,120));
    }catch(e){assistant.text="Request failed: "+(e.message||e);setStatus("Request failed");saveState();renderAll()}
  }
  async function readStream(r,msg){
    var reader=r.body.getReader(),dec=new TextDecoder(),buf="";
    while(true){var x=await reader.read();if(x.done)break;buf+=dec.decode(x.value,{stream:true});var lines=buf.split("\n");buf=lines.pop()||"";lines.forEach(function(line){line=line.trim();if(!line.startsWith("data:"))return;var data=line.slice(5).trim();if(data==="[DONE]")return;try{var j=JSON.parse(data);var t=j.choices?.[0]?.delta?.content||"";if(t){msg.text+=t;renderMessages()}}catch(e){}})}
  }

  var filesByName={};
  function renderAttachments(){var box=$("attachments");box.innerHTML="";attachments.forEach(function(f,i){var c=document.createElement("span");c.className="chip";c.textContent=(f.kind==="image"?"Image: ":"File: ")+f.name+" ";var b=document.createElement("button");b.type="button";b.textContent="×";b.onclick=function(){attachments.splice(i,1);delete filesByName[f.name];renderAttachments()};c.appendChild(b);box.appendChild(c)})}
  async function addFiles(list){
    for(var i=0;i<list.length;i++){
      var file=list[i];var item={name:file.name,type:file.type,kind:file.type.startsWith("image/")?"image":"file"};
      if(item.kind==="image")item.dataUrl=await readAsDataUrl(file);
      else item.text=await readAsText(file);
      attachments.push(item);filesByName[item.name]=item;
    }
    renderAttachments();
  }
  function readAsDataUrl(f){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result)};r.onerror=rej;r.readAsDataURL(f)})}
  function readAsText(f){return new Promise(function(res){var r=new FileReader();r.onload=function(){res(String(r.result||""))};r.onerror=function(){res("[binary file: "+f.name+"]")};r.readAsText(f)})}

  function speak(text){if(!("speechSynthesis"in window))return;speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(text.replace(/```[\s\S]*?```/g,"code block").slice(0,4000));speechSynthesis.speak(u)}
  function setupVoice(){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){$("micBtn").disabled=true;return}
    recognition=new SR();recognition.continuous=false;recognition.interimResults=true;
    recognition.onresult=function(e){var s="";for(var i=e.resultIndex;i<e.results.length;i++)s+=e.results[i][0].transcript;$("prompt").value=s;autoSize()}
    recognition.onend=function(){$("micBtn").classList.remove("active")}
  }
  function notify(title,body){if(!("Notification"in window))return;if(Notification.permission==="granted")new Notification(title,{body:body});else if(Notification.permission!=="denied")Notification.requestPermission()}

  function openRight(){right.classList.add("open");overlay.classList.add("show");app.classList.remove("right-closed")}
  function closeRight(){right.classList.remove("open");overlay.classList.remove("show");if(innerWidth>1100)app.classList.add("right-closed")}
  function autoSize(){var t=$("prompt");t.style.height="auto";t.style.height=Math.min(t.scrollHeight,180)+"px"}

  $("newChat").onclick=newChat;$("historyBtn").onclick=function(){$("historyPop").classList.toggle("open")};
  $("leftToggle").onclick=function(){app.classList.toggle("left-closed")};$("mobileLeft").onclick=function(){left.classList.toggle("open");overlay.classList.toggle("show")};
  $("rightToggle").onclick=openRight;$("closeRight").onclick=closeRight;overlay.onclick=function(){left.classList.remove("open");closeRight()};
  $("modelBtn").onclick=function(){$("modelMenu").classList.toggle("open")};$("modelSearch").oninput=renderModels;$("modelSelect").onchange=function(){state.model=this.value;saveState();renderAll()};
  $("saveSettings").onclick=function(){readSettingsFromUi();loadModels()};$("reloadModels").onclick=loadModels;$("theme").onchange=function(){readSettingsFromUi()};
  $("speakReplies").onchange=readSettingsFromUi;$("notifyReplies").onchange=readSettingsFromUi;$("stream").onchange=readSettingsFromUi;
  $("composer").onsubmit=function(e){e.preventDefault();submit()};$("prompt").addEventListener("input",autoSize);
  $("attachBtn").onclick=function(){$("fileInput").click()};$("fileInput").onchange=function(){addFiles(this.files);this.value=""};
  $("micBtn").onclick=function(){if(recognition){$("micBtn").classList.add("active");recognition.start()}};
  $("historySearch").oninput=renderChats;
  $("clearChats").onclick=function(){if(confirm("Clear all local web chats?")){state.chats=[];activeChat=null;saveState();renderAll()}};
  $("exportChats").onclick=function(){var blob=new Blob([JSON.stringify(state.chats,null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="toolneuron-web-chats.json";a.click();URL.revokeObjectURL(a.href)};
  document.querySelectorAll("[data-prompt]").forEach(function(b){b.onclick=function(){$("prompt").value=b.dataset.prompt;autoSize()}});
  window.addEventListener("dragover",function(e){e.preventDefault();$("drop").classList.add("show")});
  window.addEventListener("dragleave",function(e){if(e.clientX<=0||e.clientY<=0||e.clientX>=innerWidth||e.clientY>=innerHeight)$("drop").classList.remove("show")});
  window.addEventListener("drop",function(e){e.preventDefault();$("drop").classList.remove("show");addFiles(e.dataTransfer.files)});
  document.addEventListener("click",function(e){if(!$("modelMenu").contains(e.target)&&!$("modelBtn").contains(e.target))$("modelMenu").classList.remove("open");if(!$("historyPop").contains(e.target)&&!$("historyBtn").contains(e.target))$("historyPop").classList.remove("open")});

  applySettingsToUi();activeChat=state.chats[0]||null;setupVoice();renderAll();loadModels();
})();
</script>
