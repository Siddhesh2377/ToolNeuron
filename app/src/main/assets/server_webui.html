<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Tool-Neuron</title>
<style>
  :root {
    color-scheme: light dark;
    --fg:#1c1c1e; --fg-muted:#6b6b70;
    --bg:#ffffff; --bg-soft:#f6f6f8; --bg-card:#ffffff;
    --border:#e5e5ea;
    --primary:#0a84ff; --primary-soft:rgba(10,132,255,0.10);
    --code-bg:#f4f4f6; --code-fg:#1c1c1e;
    --user-bg:#0a84ff; --user-fg:#ffffff;
    --radius:14px; --radius-sm:10px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --fg:#f2f2f7; --fg-muted:#98989f;
      --bg:#000000; --bg-soft:#1c1c1e; --bg-card:#1c1c1e;
      --border:#2c2c2e;
      --primary-soft:rgba(10,132,255,0.18);
      --code-bg:#2c2c2e; --code-fg:#f2f2f7;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin:0; padding:0; height:100%;
    background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,"Helvetica Neue",Arial,sans-serif;
    font-size:15px; line-height:1.5;
    text-rendering:optimizeLegibility;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  .app { display:grid; grid-template-columns:280px 1fr; height:100dvh; }
  @media (max-width:880px) {
    .app { grid-template-columns:1fr; }
    .sidebar {
      position:fixed; top:0; bottom:0; left:0; width:280px;
      transform:translateX(-100%);
      z-index:30;
      transition:transform 200ms ease-out;
      will-change:transform;
    }
    .sidebar.open { transform:translateX(0); }
    .scrim {
      position:fixed; inset:0;
      background:rgba(0,0,0,0.32);
      z-index:20;
      opacity:0; pointer-events:none;
      transition:opacity 200ms ease-out;
    }
    .scrim.open { opacity:1; pointer-events:auto; }
    .menu-btn { display:inline-flex !important; }
  }
  .sidebar {
    background:var(--bg-soft); border-right:1px solid var(--border);
    display:flex; flex-direction:column; height:100dvh; overflow:hidden;
  }
  .sidebar-header { padding:18px 16px 12px; flex-shrink:0; }
  .sidebar-header h1 { font-size:14px; font-weight:700; margin:0 0 2px; letter-spacing:-0.01em; }
  .sidebar-header .sub { font-size:12px; color:var(--fg-muted); margin:0 0 12px; }
  .new-chat {
    width:100%;
    display:flex; align-items:center; justify-content:center; gap:6px;
    background:var(--primary); color:#fff; border:none;
    padding:10px 14px; border-radius:var(--radius-sm);
    font-size:14px; font-weight:600; cursor:pointer;
    transition:background-color 100ms;
    font-family:inherit;
  }
  .new-chat:hover { background:#0070d8; }
  .chat-list { flex:1; overflow-y:auto; padding:4px 8px 8px; }
  .chat-list::-webkit-scrollbar { width:8px; }
  .chat-list::-webkit-scrollbar-thumb { background:rgba(127,127,127,0.25); border-radius:4px; }
  .chat-item {
    display:flex; align-items:center; gap:8px;
    padding:9px 10px; margin:1px 0;
    border-radius:var(--radius-sm);
    cursor:pointer;
    transition:background-color 100ms;
    overflow:hidden;
  }
  .chat-item:hover { background:rgba(127,127,127,0.08); }
  .chat-item.active { background:var(--primary-soft); }
  .chat-item .label {
    flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    font-size:14px; color:var(--fg);
  }
  .chat-item.active .label { color:var(--primary); font-weight:600; }
  .chat-item .actions { display:flex; gap:4px; opacity:0; transition:opacity 100ms; }
  .chat-item:hover .actions { opacity:1; }
  .icon-btn {
    width:26px; height:26px;
    border:none; background:transparent; color:var(--fg-muted);
    border-radius:6px; cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center;
    flex-shrink:0;
    font-family:inherit;
  }
  .icon-btn:hover { background:rgba(127,127,127,0.12); color:var(--fg); }
  .sidebar-footer {
    padding:8px;
    border-top:1px solid var(--border);
    flex-shrink:0;
    display:flex; gap:4px;
  }
  .sidebar-footer button, .sidebar-footer a {
    flex:1; background:transparent; border:1px solid var(--border);
    color:var(--fg-muted);
    padding:8px; border-radius:var(--radius-sm);
    font-size:12px; font-weight:500;
    text-align:center; cursor:pointer; text-decoration:none;
    font-family:inherit;
    transition:background-color 100ms, color 100ms;
  }
  .sidebar-footer button:hover, .sidebar-footer a:hover { background:var(--bg-card); color:var(--fg); }
  .main { display:flex; flex-direction:column; min-width:0; height:100dvh; }
  .topbar {
    display:flex; align-items:center; gap:10px;
    padding:10px 16px;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
    background:var(--bg);
    backdrop-filter:saturate(180%) blur(10px);
    -webkit-backdrop-filter:saturate(180%) blur(10px);
  }
  .menu-btn {
    display:none;
    width:36px; height:36px;
    align-items:center; justify-content:center;
    border:1px solid var(--border); background:var(--bg-card); color:var(--fg);
    border-radius:50%; cursor:pointer;
    flex-shrink:0;
    font-family:inherit;
  }
  .topbar-title {
    flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    font-weight:600; font-size:15px;
  }
  .conn { display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--fg-muted); }
  .conn .dot { width:8px; height:8px; border-radius:50%; background:#ff3b30; transition:background-color 200ms; }
  .conn.live .dot { background:#34c759; }
  .messages {
    flex:1; overflow-y:auto;
    overflow-anchor:auto;
    padding:16px 16px 24px;
    overscroll-behavior:contain;
  }
  .messages::-webkit-scrollbar { width:10px; }
  .messages::-webkit-scrollbar-thumb { background:rgba(127,127,127,0.25); border-radius:5px; }
  .messages-inner {
    max-width:720px; margin:0 auto;
    display:flex; flex-direction:column; gap:18px;
  }
  .welcome { text-align:center; padding:60px 16px; color:var(--fg-muted); }
  .welcome h2 { font-size:22px; color:var(--fg); margin:0 0 8px; letter-spacing:-0.01em; }
  .suggestions {
    display:grid; grid-template-columns:repeat(2, 1fr); gap:8px;
    max-width:540px; margin:24px auto 0;
  }
  @media (max-width:540px) { .suggestions { grid-template-columns:1fr; } }
  .suggestion {
    border:1px solid var(--border); background:var(--bg-card);
    border-radius:var(--radius); padding:12px 14px;
    text-align:left; cursor:pointer;
    font-size:14px; color:var(--fg);
    font-family:inherit;
    transition:border-color 100ms, background-color 100ms;
  }
  .suggestion:hover { border-color:var(--primary); background:var(--primary-soft); }
  .msg { display:flex; gap:10px; align-items:flex-start; }
  .msg.user { flex-direction:row-reverse; }
  .avatar {
    width:28px; height:28px; border-radius:50%;
    background:var(--bg-soft); color:var(--fg-muted);
    flex-shrink:0;
    display:inline-flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700;
    margin-top:2px;
  }
  .msg.user .avatar { background:var(--primary); color:#fff; }
  .bubble {
    background:var(--bg-soft); color:var(--fg);
    border-radius:var(--radius);
    padding:10px 14px;
    max-width:calc(100% - 50px);
    word-wrap:break-word; overflow-wrap:anywhere;
    line-height:1.5;
    contain:layout style;
  }
  .msg.user .bubble { background:var(--user-bg); color:var(--user-fg); }
  .bubble p { margin:0 0 8px; }
  .bubble p:last-child { margin:0; }
  .bubble h1, .bubble h2, .bubble h3, .bubble h4 { margin:12px 0 6px; font-weight:700; line-height:1.25; }
  .bubble h1 { font-size:20px; } .bubble h2 { font-size:17px; } .bubble h3 { font-size:15px; }
  .bubble ul, .bubble ol { margin:0 0 8px; padding-left:22px; }
  .bubble li { margin:2px 0; }
  .bubble code {
    background:var(--code-bg); color:var(--code-fg);
    padding:1px 5px; border-radius:4px;
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    font-size:13px;
  }
  .msg.user .bubble code { background:rgba(255,255,255,0.18); color:#fff; }
  .bubble pre {
    margin:8px 0; padding:10px 12px;
    background:var(--code-bg); color:var(--code-fg);
    border-radius:var(--radius-sm);
    overflow-x:auto;
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    font-size:13px; line-height:1.55;
    position:relative;
  }
  .msg.user .bubble pre { background:rgba(0,0,0,0.20); color:#fff; }
  .bubble pre code { background:transparent; padding:0; }
  .copy-code {
    position:absolute; top:6px; right:6px;
    background:var(--bg-card); color:var(--fg-muted);
    border:1px solid var(--border); border-radius:5px;
    font-size:11px; padding:2px 6px;
    opacity:0; transition:opacity 100ms;
    cursor:pointer;
    font-family:inherit;
  }
  .bubble pre:hover .copy-code { opacity:1; }
  .copy-code.copied { color:var(--primary); border-color:var(--primary); }
  .bubble blockquote { border-left:3px solid var(--primary); margin:6px 0; padding-left:10px; color:var(--fg-muted); }
  .bubble a { color:var(--primary); }
  .cursor::after {
    content:''; display:inline-block;
    width:0.5em; height:1em;
    background:currentColor; margin-left:2px; vertical-align:-2px;
    animation:blink 1s steps(2) infinite;
    opacity:0.7;
  }
  @keyframes blink { 50% { opacity:0; } }
  .composer {
    padding:12px 16px calc(12px + var(--safe-bottom));
    border-top:1px solid var(--border);
    flex-shrink:0;
    background:var(--bg);
  }
  .composer-inner {
    max-width:720px; margin:0 auto;
    display:flex; align-items:flex-end; gap:8px;
    background:var(--bg-soft);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:8px 8px 8px 14px;
    transition:border-color 120ms;
  }
  .composer-inner:focus-within { border-color:var(--primary); }
  .composer textarea {
    flex:1; border:none; background:transparent; color:var(--fg);
    font-family:inherit; font-size:15px; line-height:1.45;
    padding:8px 0;
    resize:none; outline:none;
    min-height:22px; max-height:240px;
  }
  .send-btn {
    width:36px; height:36px;
    border:none; border-radius:50%;
    background:var(--primary); color:#fff;
    cursor:pointer; flex-shrink:0;
    display:inline-flex; align-items:center; justify-content:center;
    transition:background-color 100ms, opacity 100ms;
    font-family:inherit;
  }
  .send-btn:disabled { opacity:0.4; cursor:not-allowed; }
  .send-btn:hover:not(:disabled) { background:#0070d8; }
  .send-btn.stop { background:#ff3b30; }
  .send-btn.stop:hover:not(:disabled) { background:#d32d24; }
  .toast {
    position:fixed;
    bottom:calc(20px + var(--safe-bottom));
    left:50%; transform:translateX(-50%);
    background:rgba(28,28,30,0.92); color:#fff;
    padding:8px 14px; border-radius:999px;
    font-size:13px;
    box-shadow:0 4px 18px rgba(0,0,0,0.2);
    z-index:100;
    opacity:0; pointer-events:none;
    transition:opacity 200ms;
  }
  .toast.show { opacity:1; }
  .modal-scrim {
    position:fixed; inset:0;
    background:rgba(0,0,0,0.32);
    z-index:50;
    display:none;
    align-items:center; justify-content:center;
    padding:16px;
  }
  .modal-scrim.open { display:flex; }
  .modal {
    width:100%; max-width:440px;
    background:var(--bg-card);
    border-radius:var(--radius);
    box-shadow:0 20px 50px rgba(0,0,0,0.3), 0 0 0 1px var(--border);
    overflow:hidden;
  }
  .modal-header { padding:16px 20px 8px; font-size:17px; font-weight:700; }
  .modal-body { padding:0 20px 16px; }
  .modal-body label {
    display:block;
    font-size:12px; font-weight:600; color:var(--fg-muted);
    margin:12px 0 4px;
    text-transform:uppercase; letter-spacing:0.04em;
  }
  .modal-body input {
    width:100%;
    border:1px solid var(--border);
    background:var(--bg-soft); color:var(--fg);
    padding:10px 12px; border-radius:var(--radius-sm);
    font-size:14px; font-family:inherit;
    outline:none;
    transition:border-color 100ms;
  }
  .modal-body input:focus { border-color:var(--primary); }
  .modal-body .info { font-size:13px; color:var(--fg-muted); margin:12px 0 4px; line-height:1.45; }
  .modal-footer {
    padding:12px 20px 16px;
    display:flex; gap:8px; justify-content:flex-end;
    border-top:1px solid var(--border);
    background:var(--bg-soft);
  }
  .btn {
    border:1px solid var(--border);
    background:var(--bg-card); color:var(--fg);
    padding:8px 14px; border-radius:var(--radius-sm);
    font-size:14px; font-weight:500;
    cursor:pointer;
    transition:background-color 100ms, color 100ms, border-color 100ms;
    font-family:inherit;
  }
  .btn:hover { background:var(--bg-soft); }
  .btn.primary { background:var(--primary); color:#fff; border-color:var(--primary); }
  .btn.primary:hover { background:#0070d8; border-color:#0070d8; }
  .btn.danger { color:#ff3b30; }
  .btn.danger:hover { background:rgba(255,59,48,0.10); border-color:#ff3b30; }
</style>
</head>
<body>
<div class="scrim" id="scrim" onclick="closeNav()"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>Tool-Neuron</h1>
      <div class="sub" id="modelSub">…</div>
      <button class="new-chat" onclick="newChat()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        New chat
      </button>
    </div>
    <div class="chat-list" id="chatList"></div>
    <div class="sidebar-footer">
      <button onclick="openSettings()">Settings</button>
      <a href="/docs" target="_blank">API docs</a>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="toggleNav()" aria-label="Open menu">☰</button>
      <span class="topbar-title" id="topbarTitle">New chat</span>
      <span class="conn" id="conn"><span class="dot"></span><span id="connText">Checking…</span></span>
      <button class="icon-btn" onclick="renameActive()" title="Rename" aria-label="Rename">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
      </button>
    </div>
    <div class="messages" id="messages">
      <div class="messages-inner" id="messagesInner"></div>
    </div>
    <div class="composer">
      <div class="composer-inner">
        <textarea id="input" placeholder="Send a message…" rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="onSendOrStop()" aria-label="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l14 0M13 6l6 6-6 6"/></svg>
        </button>
      </div>
    </div>
  </main>
</div>
<div class="modal-scrim" id="settingsModal">
  <div class="modal">
    <div class="modal-header">Settings</div>
    <div class="modal-body">
      <label for="tokenInput">Bearer token</label>
      <input id="tokenInput" type="password" placeholder="tn_sk_..." autocomplete="off" />
      <div class="info">From the Server screen in the Tool-Neuron app. Stored locally in this browser only.</div>
      <label>Server</label>
      <input id="hostInfo" type="text" readonly />
      <label>Model</label>
      <input id="modelInfo" type="text" readonly />
    </div>
    <div class="modal-footer">
      <button class="btn danger" onclick="clearAllChats()">Clear all chats</button>
      <button class="btn" onclick="closeSettings()">Cancel</button>
      <button class="btn primary" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>
<div class="modal-scrim" id="renameModal">
  <div class="modal">
    <div class="modal-header">Rename chat</div>
    <div class="modal-body">
      <label for="renameInput">Title</label>
      <input id="renameInput" type="text" />
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeRename()">Cancel</button>
      <button class="btn primary" onclick="saveRename()">Save</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
(function() {
  var STORAGE_KEY = 'tn.chats.v3';
  var TOKEN_KEY = 'tn.token';
  var state = {
    chats: [], activeId: null, streaming: false, abort: null,
    model: '', token: localStorage.getItem(TOKEN_KEY) || '',
  };
  var els = {
    chatList: document.getElementById('chatList'),
    messagesInner: document.getElementById('messagesInner'),
    messages: document.getElementById('messages'),
    topbarTitle: document.getElementById('topbarTitle'),
    input: document.getElementById('input'),
    sendBtn: document.getElementById('sendBtn'),
    sidebar: document.getElementById('sidebar'),
    scrim: document.getElementById('scrim'),
    settingsModal: document.getElementById('settingsModal'),
    renameModal: document.getElementById('renameModal'),
    tokenInput: document.getElementById('tokenInput'),
    renameInput: document.getElementById('renameInput'),
    hostInfo: document.getElementById('hostInfo'),
    modelInfo: document.getElementById('modelInfo'),
    modelSub: document.getElementById('modelSub'),
    toast: document.getElementById('toast'),
    conn: document.getElementById('conn'),
    connText: document.getElementById('connText'),
  };
  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        state.chats = parsed.chats || [];
        state.activeId = parsed.activeId || null;
      }
    } catch (e) {}
    if (state.chats.length === 0) {
      var id = newChatId();
      state.chats.push({ id: id, title: 'New chat', messages: [] });
      state.activeId = id;
    }
    if (!state.activeId || !state.chats.find(function(c) { return c.id === state.activeId; })) {
      state.activeId = state.chats[0].id;
    }
  }
  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ chats: state.chats, activeId: state.activeId }));
    } catch (e) {}
  }
  function newChatId() { return 'c' + Date.now() + Math.random().toString(36).slice(2, 6); }
  function activeChat() { return state.chats.find(function(c) { return c.id === state.activeId; }); }
  function renderSidebar() {
    els.chatList.innerHTML = '';
    state.chats.forEach(function(c) {
      var div = document.createElement('div');
      div.className = 'chat-item' + (c.id === state.activeId ? ' active' : '');
      div.dataset.id = c.id;
      div.innerHTML =
        '<div class="label">' + escapeHtml(c.title) + '</div>' +
        '<div class="actions"><button class="icon-btn" data-act="del" title="Delete" aria-label="Delete">' +
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6l-1.5 14a2 2 0 0 1-2 1.8H8.5a2 2 0 0 1-2-1.8L5 6M10 11v6M14 11v6M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>' +
        '</button></div>';
      div.onclick = function(e) {
        if (e.target.closest('[data-act="del"]')) {
          deleteChat(c.id);
          e.stopPropagation();
          return;
        }
        selectChat(c.id);
      };
      els.chatList.appendChild(div);
    });
  }
  function renderMessages() {
    var chat = activeChat();
    els.messagesInner.innerHTML = '';
    if (!chat || chat.messages.length === 0) {
      var wel = document.createElement('div');
      wel.className = 'welcome';
      wel.innerHTML =
        '<h2>How can I help today?</h2>' +
        '<div>Ask anything — your message stays on this device.</div>' +
        '<div class="suggestions">' +
        '<button class="suggestion" data-sug="Explain quantum entanglement in simple terms.">Explain quantum entanglement in simple terms.</button>' +
        '<button class="suggestion" data-sug="Write a haiku about debugging.">Write a haiku about debugging.</button>' +
        '<button class="suggestion" data-sug="Compare REST and gRPC for a beginner.">Compare REST and gRPC for a beginner.</button>' +
        '<button class="suggestion" data-sug="Give me a 5-day Python plan for a backend engineer.">Give me a 5-day Python plan for a backend engineer.</button>' +
        '</div>';
      wel.querySelectorAll('.suggestion').forEach(function(s) {
        s.onclick = function() {
          els.input.value = s.dataset.sug;
          els.input.dispatchEvent(new Event('input'));
          els.input.focus();
        };
      });
      els.messagesInner.appendChild(wel);
      return;
    }
    chat.messages.forEach(function(m) {
      els.messagesInner.appendChild(renderMessage(m));
    });
    scrollToBottom();
  }
  function renderMessage(m) {
    var wrap = document.createElement('div');
    wrap.className = 'msg ' + m.role;
    var av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = m.role === 'user' ? 'You' : 'AI';
    var bub = document.createElement('div');
    bub.className = 'bubble';
    bub.dataset.id = m.id;
    bub.innerHTML = renderMarkdown(m.content || '');
    if (m.streaming) bub.classList.add('cursor');
    wireCopy(bub);
    wrap.appendChild(av);
    wrap.appendChild(bub);
    return wrap;
  }
  function selectChat(id) {
    if (state.streaming) return;
    state.activeId = id;
    save();
    refreshAll();
    closeNav();
  }
  function newChat() {
    if (state.streaming) return;
    var id = newChatId();
    state.chats.unshift({ id: id, title: 'New chat', messages: [] });
    state.activeId = id;
    save();
    refreshAll();
    closeNav();
    els.input.focus();
  }
  function deleteChat(id) {
    if (state.streaming) return;
    state.chats = state.chats.filter(function(c) { return c.id !== id; });
    if (state.chats.length === 0) {
      var nid = newChatId();
      state.chats.push({ id: nid, title: 'New chat', messages: [] });
      state.activeId = nid;
    } else if (state.activeId === id) {
      state.activeId = state.chats[0].id;
    }
    save();
    refreshAll();
  }
  function renameActive() {
    var chat = activeChat();
    if (!chat) return;
    els.renameInput.value = chat.title;
    els.renameModal.classList.add('open');
    setTimeout(function() { els.renameInput.focus(); }, 50);
  }
  function closeRename() { els.renameModal.classList.remove('open'); }
  function saveRename() {
    var v = els.renameInput.value.trim();
    if (v) {
      activeChat().title = v;
      save();
      refreshAll();
    }
    closeRename();
  }
  function clearAllChats() {
    if (state.streaming) return;
    if (!confirm('Delete every chat?')) return;
    var id = newChatId();
    state.chats = [{ id: id, title: 'New chat', messages: [] }];
    state.activeId = id;
    save();
    refreshAll();
    closeSettings();
  }
  function refreshAll() {
    renderSidebar();
    renderMessages();
    var c = activeChat();
    els.topbarTitle.textContent = c ? c.title : 'Chat';
  }
  var scrollAnchored = true;
  els.messages.addEventListener('scroll', function() {
    var dist = els.messages.scrollHeight - els.messages.scrollTop - els.messages.clientHeight;
    scrollAnchored = dist < 80;
  });
  function scrollToBottom() {
    els.messages.scrollTop = els.messages.scrollHeight;
    scrollAnchored = true;
  }
  els.input.addEventListener('input', function() {
    els.input.style.height = 'auto';
    els.input.style.height = Math.min(els.input.scrollHeight, 240) + 'px';
    els.sendBtn.disabled = !state.streaming && els.input.value.trim().length === 0;
  });
  els.input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      onSendOrStop();
    }
  });
  function onSendOrStop() {
    if (state.streaming) {
      if (state.abort) state.abort.abort();
      return;
    }
    var text = els.input.value.trim();
    if (!text) return;
    sendMessage(text);
  }
  async function sendMessage(text) {
    var chat = activeChat();
    if (!chat) return;
    var userMsg = { id: 'u' + Date.now(), role: 'user', content: text };
    chat.messages.push(userMsg);
    if (chat.title === 'New chat') {
      chat.title = text.length > 40 ? text.slice(0, 40).trim() + '…' : text;
    }
    els.input.value = '';
    els.input.style.height = 'auto';
    save();
    refreshAll();
    var aiMsg = { id: 'a' + Date.now(), role: 'assistant', content: '', streaming: true };
    chat.messages.push(aiMsg);
    appendMessage(aiMsg);
    scrollToBottom();
    setStreaming(true);
    state.abort = new AbortController();
    var model = state.model;
    if (!model) {
      try {
        var m = await fetch('/v1/models', { headers: authHeaders() });
        if (m.ok) {
          var j = await m.json();
          model = (j.data && j.data[0] && j.data[0].id) || '';
          state.model = model;
          updateModelDisplay();
        }
      } catch (e) {}
    }
    var messages = chat.messages
      .filter(function(m) { return !m.streaming; })
      .map(function(m) { return { role: m.role, content: m.content }; });
    try {
      var r = await fetch('/v1/chat/completions', {
        method: 'POST',
        signal: state.abort.signal,
        headers: Object.assign({}, authHeaders(), { 'Content-Type': 'application/json' }),
        body: JSON.stringify({ model: model, messages: messages, stream: true }),
      });
      if (!r.ok) {
        var detail = '';
        try { var ej = await r.json(); detail = (ej.error && ej.error.message) || ''; } catch (e) {}
        var txt = detail ? 'Error ' + r.status + ': ' + detail : 'HTTP ' + r.status;
        finishStream(aiMsg, txt, true);
        return;
      }
      var reader = r.body.getReader();
      var dec = new TextDecoder();
      var buf = '';
      while (true) {
        var rd = await reader.read();
        if (rd.done) break;
        buf += dec.decode(rd.value, { stream: true });
        var idx;
        while ((idx = buf.indexOf('\n\n')) >= 0) {
          var line = buf.slice(0, idx).trim();
          buf = buf.slice(idx + 2);
          if (line.indexOf('data:') !== 0) continue;
          var json = line.slice(5).trim();
          if (json === '[DONE]') break;
          try {
            var chunk = JSON.parse(json);
            var delta = chunk.choices && chunk.choices[0] && chunk.choices[0].delta && chunk.choices[0].delta.content;
            if (delta) {
              aiMsg.content += delta;
              updateStreamingBubble(aiMsg);
            }
          } catch (e) {}
        }
      }
      finishStream(aiMsg, null, false);
    } catch (e) {
      if (e.name === 'AbortError') {
        finishStream(aiMsg, '⏹ stopped', true);
      } else {
        finishStream(aiMsg, 'Network error: ' + e.message, true);
      }
    }
  }
  function finishStream(aiMsg, errText, isError) {
    if (errText) {
      aiMsg.content = (aiMsg.content || '') + (aiMsg.content ? '\n\n' : '') + errText;
    }
    aiMsg.streaming = false;
    setStreaming(false);
    save();
    var bub = bubbleEl(aiMsg.id);
    if (bub) {
      bub.classList.remove('cursor');
      bub.innerHTML = renderMarkdown(aiMsg.content);
      wireCopy(bub);
    }
  }
  function appendMessage(m) {
    var node = renderMessage(m);
    els.messagesInner.appendChild(node);
  }
  function bubbleEl(id) {
    return els.messagesInner.querySelector('.bubble[data-id="' + id + '"]');
  }
  var streamRaf = null;
  function updateStreamingBubble(m) {
    var bub = bubbleEl(m.id);
    if (!bub) return;
    if (streamRaf) return;
    streamRaf = requestAnimationFrame(function() {
      streamRaf = null;
      bub.innerHTML = renderMarkdown(m.content);
      bub.classList.add('cursor');
      wireCopy(bub);
      if (scrollAnchored) {
        els.messages.scrollTop = els.messages.scrollHeight;
      }
    });
  }
  function setStreaming(on) {
    state.streaming = on;
    els.sendBtn.classList.toggle('stop', on);
    els.sendBtn.disabled = on ? false : els.input.value.trim().length === 0;
    els.sendBtn.setAttribute('aria-label', on ? 'Stop' : 'Send');
    els.sendBtn.innerHTML = on
      ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l14 0M13 6l6 6-6 6"/></svg>';
  }
  function authHeaders() {
    return state.token ? { 'Authorization': 'Bearer ' + state.token } : {};
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function renderMarkdown(src) {
    if (!src) return '';
    var parts = src.split(/```/);
    var out = '';
    for (var i = 0; i < parts.length; i++) {
      if (i % 2 === 1) {
        var lines = parts[i].split('\n');
        var code = lines.slice(1).join('\n');
        out += '<pre><button class="copy-code">Copy</button><code>' + escapeHtml(code) + '</code></pre>';
      } else {
        out += renderInlineBlocks(parts[i]);
      }
    }
    return out;
  }
  function renderInlineBlocks(text) {
    var lines = text.split('\n');
    var out = '';
    var i = 0;
    while (i < lines.length) {
      var ln = lines[i];
      var heading = /^(#{1,4})\s+(.*)$/.exec(ln);
      if (heading) {
        var lvl = heading[1].length;
        out += '<h' + lvl + '>' + formatInline(heading[2]) + '</h' + lvl + '>';
        i++;
        continue;
      }
      if (/^>\s?/.test(ln)) {
        var buf = '';
        while (i < lines.length && /^>\s?/.test(lines[i])) {
          buf += lines[i].replace(/^>\s?/, '') + '\n';
          i++;
        }
        out += '<blockquote>' + formatInline(buf.trim()) + '</blockquote>';
        continue;
      }
      if (/^[-*+]\s+/.test(ln)) {
        var items = '';
        while (i < lines.length && /^[-*+]\s+/.test(lines[i])) {
          items += '<li>' + formatInline(lines[i].replace(/^[-*+]\s+/, '')) + '</li>';
          i++;
        }
        out += '<ul>' + items + '</ul>';
        continue;
      }
      if (/^\d+\.\s+/.test(ln)) {
        var items2 = '';
        while (i < lines.length && /^\d+\.\s+/.test(lines[i])) {
          items2 += '<li>' + formatInline(lines[i].replace(/^\d+\.\s+/, '')) + '</li>';
          i++;
        }
        out += '<ol>' + items2 + '</ol>';
        continue;
      }
      if (ln.trim() === '') { i++; continue; }
      var para = '';
      while (i < lines.length && lines[i].trim() !== ''
             && !/^(#{1,4})\s/.test(lines[i])
             && !/^>/.test(lines[i])
             && !/^[-*+]\s/.test(lines[i])
             && !/^\d+\.\s/.test(lines[i])) {
        para += (para ? '<br>' : '') + formatInline(lines[i]);
        i++;
      }
      if (para) out += '<p>' + para + '</p>';
    }
    return out;
  }
  function formatInline(s) {
    var r = escapeHtml(s);
    r = r.replace(/`([^`]+)`/g, '<code>$1</code>');
    r = r.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    r = r.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
    r = r.replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g,
      '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
    return r;
  }
  function wireCopy(bubble) {
    bubble.querySelectorAll('.copy-code').forEach(function(btn) {
      btn.onclick = function() {
        var code = btn.parentElement.querySelector('code');
        navigator.clipboard.writeText(code.innerText).then(function() {
          btn.classList.add('copied');
          btn.textContent = 'Copied';
          setTimeout(function() {
            btn.classList.remove('copied');
            btn.textContent = 'Copy';
          }, 1200);
        });
      };
    });
  }
  function toggleNav() {
    els.sidebar.classList.toggle('open');
    els.scrim.classList.toggle('open');
  }
  function closeNav() {
    els.sidebar.classList.remove('open');
    els.scrim.classList.remove('open');
  }
  window.toggleNav = toggleNav;
  window.closeNav = closeNav;
  window.newChat = newChat;
  window.renameActive = renameActive;
  window.openSettings = openSettings;
  window.closeSettings = closeSettings;
  window.saveSettings = saveSettings;
  window.closeRename = closeRename;
  window.saveRename = saveRename;
  window.clearAllChats = clearAllChats;
  window.onSendOrStop = onSendOrStop;
  function openSettings() {
    els.tokenInput.value = state.token;
    els.hostInfo.value = location.host;
    els.modelInfo.value = state.model || '(not loaded)';
    els.settingsModal.classList.add('open');
  }
  function closeSettings() { els.settingsModal.classList.remove('open'); }
  function saveSettings() {
    state.token = els.tokenInput.value.trim();
    if (state.token) localStorage.setItem(TOKEN_KEY, state.token);
    else localStorage.removeItem(TOKEN_KEY);
    closeSettings();
    fetchModel();
  }
  function updateModelDisplay() {
    els.modelSub.textContent = state.model || 'No model loaded';
  }
  var toastTimer = null;
  function toast(msg) {
    els.toast.textContent = msg;
    els.toast.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { els.toast.classList.remove('show'); }, 1800);
  }
  async function fetchModel() {
    try {
      var r = await fetch('/v1/models', { headers: authHeaders() });
      if (!r.ok) {
        state.model = '';
        updateModelDisplay();
        return;
      }
      var j = await r.json();
      state.model = (j.data && j.data[0] && j.data[0].id) || '';
      updateModelDisplay();
    } catch (e) {
      state.model = '';
      updateModelDisplay();
    }
  }
  async function checkHealth() {
    try {
      var r = await fetch('/health');
      if (r.ok) {
        els.conn.classList.add('live');
        els.connText.textContent = 'Connected';
      } else {
        els.conn.classList.remove('live');
        els.connText.textContent = 'Server ' + r.status;
      }
    } catch (e) {
      els.conn.classList.remove('live');
      els.connText.textContent = 'Offline';
    }
  }
  load();
  refreshAll();
  fetchModel();
  checkHealth();
  setInterval(checkHealth, 30000);
  if (!state.token) {
    setTimeout(function() { toast('Open Settings → paste your bearer token'); }, 600);
  }
})();
</script>
</body>
